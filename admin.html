<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Prototype HTML</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="admin">
  <div class="topbar">
    <div class="row">
      <div class="brand">
        <div class="logo">IF</div>
        <div class="title">
          <div class="k">Prototype</div>
          <div class="t">Admin</div>
        </div>
      </div>
      <div class="nav">
        <a class="btn" href="index.html">Accueil</a>
        <a class="btn" href="engineer.html">Ingénieur</a>
        <a class="btn" href="client.html">Client</a>
        <button class="btn ghost" id="resetAll">Reset</button>
      </div>
    </div>
  </div>

  <div class="container grid" style="gap:18px">
    <div class="card">
      <div class="hd">
        <h2>Clients</h2>
        <p>أضف الحرفاء وربط Email (للاستعمال الحقيقي يلزم Backend).</p>
      </div>
      <div class="bd">
        <form id="clientForm" class="grid two">
          <div class="field"><label>Nom</label><input name="name" placeholder="Nom client" required></div>
          <div class="field"><label>Email</label><input name="email" placeholder="client@gmail.com"></div>
          <div class="field"><label>Téléphone</label><input name="phone" placeholder="+216 ..."></div>
          <div class="field"><label>MF / Identifiant fiscal</label><input name="taxId" placeholder="..."></div>
          <div class="field" style="grid-column:1/-1"><label>Adresse</label><textarea name="address" placeholder="Adresse..."></textarea></div>
          <div class="row" style="grid-column:1/-1">
            <button class="btn accent" type="submit">Ajouter</button>
          </div>
        </form>

        <div class="hr"></div>
        <div id="clientsList" class="list"></div>
      </div>
    </div>

    <div class="card">
      <div class="hd">
        <h2>Projets</h2>
        <p>إنشاء مشروع وتعيين مهندس (في هذا Prototype المهندس ثابت: engineer@example.com).</p>
      </div>
      <div class="bd">
        <form id="projectForm" class="grid two">
          <div class="field"><label>Titre</label><input name="title" placeholder="Projet villa..." required></div>
          <div class="field"><label>Localisation</label><input name="location" placeholder="Gabès..."></div>
          <div class="field"><label>Client</label><select id="clientSelect" name="clientId"></select></div>
          <div class="field"><label>Ingénieur</label>
            <select id="engineerSelect" name="engineerEmail"></select>
            <div class="small muted" style="margin-top:6px">Par défaut: engineer@example.com (APPROVED).</div>
          </div>
          <div class="row" style="grid-column:1/-1">
            <button class="btn accent" type="submit">Créer projet</button>
          </div>
        </form>

        <div class="hr"></div>
        <div id="projectsList" class="list"></div>
      </div>
    </div>

    <div class="card">
      <div class="hd">
        <h2>Factures</h2>
        <p>قائمة الفواتير + تغيير الحالة.</p>
      </div>
      <div class="bd">
        <div id="invoicesList" class="list"></div>
      </div>
    </div>
  </div>

  <div id="toast" style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 14px;border-radius:14px;opacity:0;transition:.25s;font-size:14px"></div>
  <script src="app.js"></script>
</body>
</html>
